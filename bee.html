<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小蜜蜂游戏</title>
<link rel="stylesheet" href="style.css">
<style>
.bee-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
}

.bee-header {
  display: flex;
  align-items: center;
  gap: 30px;
  margin-bottom: 20px;
}

.bee-score-box {
  background: #1e3a5f;
  padding: 12px 24px;
  border-radius: 8px;
  color: #fff;
  font-size: 24px;
  font-weight: bold;
}

.bee-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #f59e0b;
  color: white;
  font-size: 16px;
  transition: background 0.3s;
}

.bee-btn:hover {
  background: #d97706;
}

.bee-game {
  background: linear-gradient(180deg, #87ceeb 0%, #98d8c8 100%);
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}

.bee-game::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3) 2px, transparent 2px),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.2) 2px, transparent 2px),
    radial-gradient(circle at 50% 70%, rgba(255,255,255,0.25) 2px, transparent 2px);
  background-size: 40px 40px;
  pointer-events: none;
}

#beeCanvas {
  border-radius: 8px;
  position: relative;
  z-index: 1;
  cursor: crosshair;
}

.bee-skills {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 15px;
}

.skill-box {
  background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 100%);
  border-radius: 8px;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 2px solid #3b82f6;
}

.skill-key {
  background: #3b82f6;
  color: white;
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 14px;
}

.skill-name {
  color: #bfdbfe;
  font-size: 14px;
}

.bee-info {
  margin-top: 20px;
  text-align: center;
  color: #666;
}

.bee-game-over {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.bee-game-over.show {
  display: flex;
}

.bee-game-over-content {
  background: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
}

.bee-game-over-content h2 {
  color: #f59e0b;
  margin-bottom: 15px;
}

.bee-main {
  display: flex;
  gap: 25px;
}

.bee-game-area {
  flex: 1;
}

.bee-leaderboard {
  width: 280px;
  background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 100%);
  border-radius: 12px;
  padding: 20px;
  border: 2px solid #3b82f6;
}

.bee-leaderboard h3 {
  color: #bfdbfe;
  margin: 0 0 15px 0;
  text-align: center;
  font-size: 20px;
}

.leaderboard-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.leaderboard-empty {
  color: #94a3b8;
  text-align: center;
  padding: 20px;
  font-size: 14px;
}

.leaderboard-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255, 255, 255, 0.1);
  padding: 10px 12px;
  border-radius: 8px;
  transition: background 0.2s;
}

.leaderboard-item:hover {
  background: rgba(255, 255, 255, 0.15);
}

.leaderboard-rank {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 14px;
}

.leaderboard-rank.rank-1 {
  background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
  color: #1e3a5f;
}

.leaderboard-rank.rank-2 {
  background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
  color: white;
}

.leaderboard-rank.rank-3 {
  background: linear-gradient(135deg, #cd7f32 0%, #a0522d 100%);
  color: white;
}

.leaderboard-rank.rank-other {
  background: rgba(255, 255, 255, 0.15);
  color: #bfdbfe;
}

.leaderboard-name {
  flex: 1;
  color: #bfdbfe;
  font-size: 14px;
}

.leaderboard-score {
  color: #fbbf24;
  font-weight: bold;
  font-size: 16px;
}

.bee-game {
  position: relative;
}

#beeCanvas {
  border-radius: 8px;
  position: relative;
  z-index: 1;
  cursor: crosshair;
  width: 500px;
  height: 400px;
}

.bee-game-over-content p {
  color: #333;
  margin-bottom: 20px;
  font-size: 18px;
}

.bee-lives {
  display: flex;
  gap: 10px;
}

.live {
  font-size: 24px;
}
</style>
</head>

<header class="hero">
  <div class="hero-content">
    <h1>🐝 小蜜蜂游戏</h1>
    <p>360度无死角射击！</p>
  </div>
</header>

<div class="bee-container">
  <div class="bee-main">
    <div class="bee-game-area">
      <div class="bee-header">
        <div class="bee-score-box">🏆 得分: <span id="beeScore">0</span></div>
        <div class="bee-score-box">❤️ 生命: <span id="beeLives">3</span></div>
        <div class="bee-score-box">⭐ 等级: <span id="beeLevel">1</span></div>
        <button class="bee-btn" onclick="startBeeGame()">开始游戏</button>
        <button class="bee-btn" onclick="pauseBeeGame()">暂停/继续</button>
      </div>
      
      <div class="bee-skills">
        <div class="skill-box" title="散射弹 - 360度发射">
          <span id="skillQ" class="skill-key">Q</span>
          <span class="skill-name">散射</span>
        </div>
        <div class="skill-box" title="激光 - 强力穿透">
          <span id="skillE" class="skill-key">E</span>
          <span class="skill-name">激光</span>
        </div>
        <div class="skill-box" title="护盾 - 无敌3秒">
          <span id="skillR" class="skill-key">R</span>
          <span class="skill-name">护盾</span>
        </div>
      </div>
      
      <div class="bee-game">
        <canvas id="beeCanvas" width="500" height="400"></canvas>
      </div>
      
      <div class="bee-info">
        <p>使用 ← → ↑ ↓ 方向键或 WASD 移动飞船</p>
        <p>按空格键发射子弹（向上扇形5连发）</p>
        <p>按 Q 散射弹 | E 激光 | R 护盾</p>
      </div>
    </div>
    
    <div class="bee-leaderboard">
      <h3>🏆 排行榜</h3>
      <div class="leaderboard-list" id="leaderboardList">
        <div class="leaderboard-empty">暂无记录</div>
      </div>
    </div>
  </div>
</div>

<div class="bee-game-over" id="beeGameOver">
  <div class="bee-game-over-content">
    <h2>🐝 游戏结束!</h2>
    <p>最终得分: <span id="beeFinalScore">0</span></p>
    <button class="bee-btn" onclick="restartBeeGame()">重新开始</button>
  </div>
</div>

<script>
const beeCanvas = document.getElementById('beeCanvas');
const beeCtx = beeCanvas.getContext('2d');

const SCALE = 1;
const BASE_PLAYER_WIDTH = 50;
const BASE_PLAYER_HEIGHT = 40;
const BULLET_WIDTH = 6;
const BULLET_HEIGHT = 6;
const ENEMY_WIDTH = 40;
const ENEMY_HEIGHT = 30;
const CANVAS_WIDTH = 500;
const CANVAS_HEIGHT = 400;

let player = { x: 250, y: 350, speed: 6, width: BASE_PLAYER_WIDTH, height: BASE_PLAYER_HEIGHT };
let bullets = [];
let enemies = [];
let score = 0;
let lives = 3;
let killCount = 0;
let level = 1;
let gameLoop = null;
let isPaused = false;
let isShielded = false;
let shieldTime = 0;
let skills = {
  scatter: { cooldown: 0, maxCooldown: 3000 },
  laser: { cooldown: 0, maxCooldown: 5000 },
  shield: { cooldown: 0, maxCooldown: 8000 }
};
let keys = { left: false, right: false, up: false, down: false, space: false, q: false, e: false, r: false };

function getLeaderboard() {
  const data = localStorage.getItem('beeGameLeaderboard');
  return data ? JSON.parse(data) : [];
}

function saveToLeaderboard(newScore) {
  const leaderboard = getLeaderboard();
  const playerName = '玩家' + Math.floor(Math.random() * 1000);
  leaderboard.push({ name: playerName, score: newScore, date: new Date().toLocaleDateString() });
  leaderboard.sort((a, b) => b.score - a.score);
  const top10 = leaderboard.slice(0, 10);
  localStorage.setItem('beeGameLeaderboard', JSON.stringify(top10));
  renderLeaderboard();
}

function renderLeaderboard() {
  const leaderboard = getLeaderboard();
  const container = document.getElementById('leaderboardList');
  
  if (leaderboard.length === 0) {
    container.innerHTML = '<div class="leaderboard-empty">暂无记录</div>';
    return;
  }
  
  container.innerHTML = leaderboard.map((item, index) => {
    const rankClass = index === 0 ? 'rank-1' : index === 1 ? 'rank-2' : index === 2 ? 'rank-3' : 'rank-other';
    return `
      <div class="leaderboard-item">
        <div class="leaderboard-rank ${rankClass}">${index + 1}</div>
        <div class="leaderboard-name">${item.name}</div>
        <div class="leaderboard-score">${item.score}</div>
      </div>
    `;
  }).join('');
}

function initBeeGame() {
  player = { x: 250, y: 350, speed: 6, width: BASE_PLAYER_WIDTH, height: BASE_PLAYER_HEIGHT };
  bullets = [];
  enemies = [];
  score = 0;
  lives = 3;
  killCount = 0;
  level = 1;
  isShielded = false;
  shieldTime = 0;
  skills = {
    scatter: { cooldown: 0, maxCooldown: 3000 },
    laser: { cooldown: 0, maxCooldown: 5000 },
    shield: { cooldown: 0, maxCooldown: 8000 }
  };
  isPaused = false;
  updateScoreDisplay();
  updateLivesDisplay();
  updateSkillsDisplay();
  document.getElementById('beeGameOver').classList.remove('show');
  
  for (let i = 0; i < 5; i++) {
    enemies.push({
      x: i * 100 + 25,
      y: -ENEMY_HEIGHT - i * 80,
      speed: 2 + Math.random() * 2,
      direction: 1
    });
  }
}

function updateSkillsDisplay() {
  document.getElementById('skillQ').textContent = skills.scatter.cooldown > 0 ? `${Math.ceil(skills.scatter.cooldown / 1000)}s` : 'Q';
  document.getElementById('skillE').textContent = skills.laser.cooldown > 0 ? `${Math.ceil(skills.laser.cooldown / 1000)}s` : 'E';
  document.getElementById('skillR').textContent = skills.shield.cooldown > 0 ? `${Math.ceil(skills.shield.cooldown / 1000)}s` : 'R';
}

function updateScoreDisplay() {
  document.getElementById('beeScore').textContent = score;
  document.getElementById('beeLevel').textContent = level;
}

function updateLivesDisplay() {
  document.getElementById('beeLives').textContent = lives;
}

function drawPlayer() {
  beeCtx.save();
  
  beeCtx.translate(player.x + player.width/2, player.y + player.height/2);
  
  const w = player.width;
  const h = player.height;
  
  if (level >= 3) {
    drawWings(w, h);
  }
  
  beeCtx.fillStyle = '#1e40af';
  beeCtx.beginPath();
  beeCtx.moveTo(0, -h/2);
  beeCtx.lineTo(-w/4, h/2);
  beeCtx.lineTo(w/4, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  if (level >= 2) {
    beeCtx.fillStyle = '#bfdbfe';
    beeCtx.beginPath();
    beeCtx.moveTo(-5, -h/3);
    beeCtx.lineTo(-3, h/4);
    beeCtx.lineTo(3, h/4);
    beeCtx.lineTo(5, -h/3);
    beeCtx.closePath();
    beeCtx.fill();
  }
  
  beeCtx.fillStyle = '#1d4ed8';
  beeCtx.beginPath();
  beeCtx.moveTo(-w/6, h/2);
  beeCtx.lineTo(0, h/2 + h/5);
  beeCtx.lineTo(w/6, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  if (level >= 4) {
    drawTail(w, h);
    drawCockpit(w, h);
    drawEngines(w, h);
  } else if (level >= 2) {
    drawSideWings(w, h);
  }
  
  if (isShielded) {
    beeCtx.strokeStyle = 'rgba(59, 130, 246, 0.8)';
    beeCtx.lineWidth = 3;
    beeCtx.beginPath();
    beeCtx.arc(0, 0, Math.max(w, h) * 0.8, 0, Math.PI * 2);
    beeCtx.stroke();
    
    beeCtx.strokeStyle = 'rgba(96, 165, 250, 0.5)';
    beeCtx.lineWidth = 2;
    beeCtx.beginPath();
    beeCtx.arc(0, 0, Math.max(w, h) * 0.9, 0, Math.PI * 2);
    beeCtx.stroke();
  }
  
  beeCtx.restore();
}

function drawWings(w, h) {
  beeCtx.fillStyle = '#0f172a';
  const wingSpan = w * 1.8;
  const wingLength = h * 0.4;
  
  beeCtx.beginPath();
  beeCtx.moveTo(-wingSpan/2, h/4);
  beeCtx.lineTo(-w/5, h/4);
  beeCtx.lineTo(-w/6, h/4 + wingLength);
  beeCtx.lineTo(-wingSpan/2, h/4 + wingLength * 0.8);
  beeCtx.closePath();
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.moveTo(wingSpan/2, h/4);
  beeCtx.lineTo(w/5, h/4);
  beeCtx.lineTo(w/6, h/4 + wingLength);
  beeCtx.lineTo(wingSpan/2, h/4 + wingLength * 0.8);
  beeCtx.closePath();
  beeCtx.fill();
}

function drawSideWings(w, h) {
  beeCtx.fillStyle = '#3b82f6';
  beeCtx.beginPath();
  beeCtx.moveTo(-w/3, h/2 - 8);
  beeCtx.lineTo(-w/2 - 10, h/2 + 5);
  beeCtx.lineTo(-w/3 + 5, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.moveTo(w/3, h/2 - 8);
  beeCtx.lineTo(w/2 + 10, h/2 + 5);
  beeCtx.lineTo(w/3 - 5, h/2);
  beeCtx.closePath();
  beeCtx.fill();
}

function drawTail(w, h) {
  beeCtx.fillStyle = '#1e3a5f';
  beeCtx.beginPath();
  beeCtx.moveTo(-w/6, h/2);
  beeCtx.lineTo(-w/10, h/2 + h/3);
  beeCtx.lineTo(-w/8, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.moveTo(w/6, h/2);
  beeCtx.lineTo(w/10, h/2 + h/3);
  beeCtx.lineTo(w/8, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  beeCtx.fillStyle = '#0f172a';
  beeCtx.beginPath();
  beeCtx.moveTo(-3, h/2);
  beeCtx.lineTo(0, h/2 + h/2.5);
  beeCtx.lineTo(3, h/2);
  beeCtx.closePath();
  beeCtx.fill();
}

function drawCockpit(w, h) {
  beeCtx.fillStyle = '#67e8f9';
  beeCtx.beginPath();
  beeCtx.ellipse(0, -h/4, w/8, h/6, 0, 0, Math.PI * 2);
  beeCtx.fill();
  
  beeCtx.fillStyle = '#22d3ee';
  beeCtx.beginPath();
  beeCtx.ellipse(0, -h/4, w/12, h/10, 0, 0, Math.PI * 2);
  beeCtx.fill();
}

function drawEngines(w, h) {
  beeCtx.fillStyle = '#374151';
  beeCtx.beginPath();
  beeCtx.ellipse(-w/3, h/4, w/12, h/8, 0, 0, Math.PI * 2);
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.ellipse(w/3, h/4, w/12, h/8, 0, 0, Math.PI * 2);
  beeCtx.fill();
  
  beeCtx.fillStyle = '#fbbf24';
  beeCtx.beginPath();
  beeCtx.ellipse(-w/3 - w/12, h/4, 3, h/12, 0, 0, Math.PI * 2);
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.ellipse(w/3 + w/12, h/4, 3, h/12, 0, 0, Math.PI * 2);
  beeCtx.fill();
}

function drawBullets() {
  bullets.forEach(bullet => {
    beeCtx.save();
    beeCtx.translate(bullet.x, bullet.y);
    
    if (bullet.isLaser) {
      const gradient = beeCtx.createLinearGradient(0, 0, 0, -bullet.height);
      gradient.addColorStop(0, '#60a5fa');
      gradient.addColorStop(0.5, '#2563eb');
      gradient.addColorStop(1, '#1e40af');
      
      beeCtx.fillStyle = gradient;
      beeCtx.fillRect(-bullet.width/2, -bullet.height/2, bullet.width, bullet.height);
      
      beeCtx.strokeStyle = '#fff';
      beeCtx.lineWidth = 1;
      beeCtx.strokeRect(-bullet.width/2, -bullet.height/2, bullet.width, bullet.height);
    } else {
      beeCtx.fillStyle = '#fbbf24';
      beeCtx.beginPath();
      beeCtx.arc(0, 0, BULLET_WIDTH/2, 0, Math.PI * 2);
      beeCtx.fill();
      
      beeCtx.fillStyle = '#f59e0b';
      beeCtx.beginPath();
      beeCtx.arc(0, 0, BULLET_WIDTH/4, 0, Math.PI * 2);
      beeCtx.fill();
    }
    
    beeCtx.restore();
  });
}

function drawEnemies() {
  enemies.forEach(enemy => {
    beeCtx.fillStyle = '#ef4444';
    beeCtx.beginPath();
    beeCtx.moveTo(enemy.x + ENEMY_WIDTH/2, enemy.y + ENEMY_HEIGHT);
    beeCtx.lineTo(enemy.x, enemy.y);
    beeCtx.lineTo(enemy.x + ENEMY_WIDTH, enemy.y);
    beeCtx.closePath();
    beeCtx.fill();
    
    beeCtx.fillStyle = '#dc2626';
    beeCtx.beginPath();
    beeCtx.arc(enemy.x + ENEMY_WIDTH/2, enemy.y + 10, 8, 0, Math.PI * 2);
    beeCtx.fill();
    
    beeCtx.fillStyle = '#fff';
    beeCtx.beginPath();
    beeCtx.arc(enemy.x + ENEMY_WIDTH/2 - 3, enemy.y + 8, 2, 0, Math.PI * 2);
    beeCtx.arc(enemy.x + ENEMY_WIDTH/2 + 3, enemy.y + 8, 2, 0, Math.PI * 2);
    beeCtx.fill();
  });
}

function updatePlayer() {
  if (keys.left && player.x > 0) {
    player.x -= player.speed;
  }
  if (keys.right && player.x < CANVAS_WIDTH - player.width) {
    player.x += player.speed;
  }
  if (keys.up && player.y > 0) {
    player.y -= player.speed;
  }
  if (keys.down && player.y < CANVAS_HEIGHT - player.height) {
    player.y += player.speed;
  }
}

function updateBullets() {
  bullets = bullets.filter(bullet => {
    bullet.x += bullet.vx;
    bullet.y += bullet.vy;
    
    if (bullet.isLaser) {
      return bullet.y > -bullet.height && bullet.y < CANVAS_HEIGHT &&
             bullet.x > 0 && bullet.x < CANVAS_WIDTH;
    }
    
    return bullet.x > 0 && bullet.x < CANVAS_WIDTH &&
           bullet.y > 0 && bullet.y < CANVAS_HEIGHT;
  });
  
  if (keys.space) {
    shootBullet();
    keys.space = false;
  }
  
  if (keys.q) {
    skillScatter();
    keys.q = false;
  }
  
  if (keys.e) {
    skillLaser();
    keys.e = false;
  }
  
  if (keys.r) {
    skillShield();
    keys.r = false;
  }
}

function shootBullet() {
  const speed = 12;
  const bulletCount = 5;
  const spreadAngle = Math.PI / 6;
  
  for (let i = 0; i < bulletCount; i++) {
    const offsetAngle = spreadAngle * ((i / (bulletCount - 1)) - 0.5) * 2 - Math.PI / 2;
    
    bullets.push({
      x: player.x + player.width/2,
      y: player.y,
      vx: Math.cos(offsetAngle) * speed,
      vy: Math.sin(offsetAngle) * speed
    });
  }
}

function skillScatter() {
  if (skills.scatter.cooldown > 0) return;
  
  skills.scatter.cooldown = skills.scatter.maxCooldown;
  
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    bullets.push({
      x: player.x + player.width/2,
      y: player.y,
      vx: Math.cos(angle) * 8,
      vy: Math.sin(angle) * 8
    });
  }
}

function skillLaser() {
  if (skills.laser.cooldown > 0) return;
  
  skills.laser.cooldown = skills.laser.maxCooldown;
  
  const maxLaserWidth = CANVAS_WIDTH;
  const laserWidth = Math.min(4 + (level - 1) * 5, maxLaserWidth);
  
  bullets.push({
    x: player.x + player.width/2,
    y: player.y,
    vx: 0,
    vy: -20,
    isLaser: true,
    width: laserWidth,
    height: 60
  });
}

function skillShield() {
  if (skills.shield.cooldown > 0) return;
  
  skills.shield.cooldown = skills.shield.maxCooldown;
  isShielded = true;
  shieldTime = 3000;
}

function updateEnemies() {
  enemies.forEach(enemy => {
    enemy.y += enemy.speed;
    enemy.x += enemy.direction * 2;
    
    if (enemy.x <= 0 || enemy.x >= CANVAS_WIDTH - ENEMY_WIDTH) {
      enemy.direction *= -1;
    }
    
    if (enemy.y > CANVAS_HEIGHT) {
      enemy.y = -ENEMY_HEIGHT;
      enemy.x = Math.random() * (CANVAS_WIDTH - ENEMY_WIDTH);
      enemy.speed = 2 + Math.random() * 2;
    }
  });
}

function checkCollisions() {
  enemies.forEach((enemy, enemyIndex) => {
    bullets.forEach((bullet, bulletIndex) => {
      let hit = false;
      
      if (bullet.isLaser) {
        const laserLeft = bullet.x - bullet.width / 2;
        const laserRight = bullet.x + bullet.width / 2;
        const laserTop = bullet.y - bullet.height / 2;
        const laserBottom = bullet.y + bullet.height / 2;
        
        if (laserRight > enemy.x && laserLeft < enemy.x + ENEMY_WIDTH &&
            laserBottom > enemy.y && laserTop < enemy.y + ENEMY_HEIGHT) {
          hit = true;
        }
      } else {
        const closestX = Math.max(enemy.x, Math.min(bullet.x, enemy.x + ENEMY_WIDTH));
        const closestY = Math.max(enemy.y, Math.min(bullet.y, enemy.y + ENEMY_HEIGHT));
        const distanceX = bullet.x - closestX;
        const distanceY = bullet.y - closestY;
        const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
        
        if (distance < BULLET_WIDTH/2 + 10) {
          hit = true;
        }
      }
      
      if (hit) {
        if (!bullet.isLaser) {
          bullets.splice(bulletIndex, 1);
        }
        enemies.splice(enemyIndex, 1);
        score += bullet.isLaser ? 200 * level : 100 * level;
        killCount++;
        
        if (killCount % 50 === 0) {
          level++;
          player.width = Math.min(BASE_PLAYER_WIDTH + level * 8, 120);
          player.height = Math.min(BASE_PLAYER_HEIGHT + level * 6, 96);
          lives += level;
          updateLivesDisplay();
        }
        
        updateScoreDisplay();
        
        enemies.push({
          x: Math.random() * (CANVAS_WIDTH - ENEMY_WIDTH),
          y: -ENEMY_HEIGHT,
          speed: 2 + Math.random() * 2 + level * 0.3,
          direction: Math.random() > 0.5 ? 1 : -1
        });
      }
    });
    
    if (!isShielded &&
      player.x < enemy.x + ENEMY_WIDTH &&
      player.x + player.width > enemy.x &&
      player.y < enemy.y + ENEMY_HEIGHT &&
      player.y + player.height > enemy.y
    ) {
      lives--;
      updateLivesDisplay();
      
      enemies.splice(enemyIndex, 1);
      enemies.push({
        x: Math.random() * (CANVAS_WIDTH - ENEMY_WIDTH),
        y: -ENEMY_HEIGHT,
        speed: 2 + Math.random() * 2,
        direction: Math.random() > 0.5 ? 1 : -1
      });
      
      if (lives <= 0) {
        beeGameOver();
      }
    }
  });
}

function beeGameOver() {
  clearInterval(gameLoop);
  saveToLeaderboard(score);
  document.getElementById('beeFinalScore').textContent = score;
  document.getElementById('beeGameOver').classList.add('show');
}

function drawBackground() {
  beeCtx.fillStyle = '#87ceeb';
  beeCtx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
  
  beeCtx.fillStyle = '#98d8c8';
  beeCtx.fillRect(0, CANVAS_HEIGHT - 30, CANVAS_WIDTH, 30);
  
  beeCtx.fillStyle = '#7fb8aa';
  for (let i = 0; i < 10; i++) {
    beeCtx.fillRect(i * 50, CANVAS_HEIGHT - 30, 30, 20);
  }
}

function beeUpdate() {
  if (isPaused) return;
  
  if (isShielded) {
    shieldTime -= 20;
    if (shieldTime <= 0) {
      isShielded = false;
    }
  }
  
  skills.scatter.cooldown = Math.max(0, skills.scatter.cooldown - 20);
  skills.laser.cooldown = Math.max(0, skills.laser.cooldown - 20);
  skills.shield.cooldown = Math.max(0, skills.shield.cooldown - 20);
  
  updateSkillsDisplay();
  
  drawBackground();
  updatePlayer();
  updateBullets();
  updateEnemies();
  checkCollisions();
  drawBullets();
  drawEnemies();
  drawPlayer();
}

function startBeeGame() {
  initBeeGame();
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(beeUpdate, 20);
}

function pauseBeeGame() {
  isPaused = !isPaused;
}

function restartBeeGame() {
  document.getElementById('beeGameOver').classList.remove('show');
  startBeeGame();
}



document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowLeft':
    case 'a':
    case 'A':
      keys.left = true;
      break;
    case 'ArrowRight':
    case 'd':
    case 'D':
      keys.right = true;
      break;
    case 'ArrowUp':
    case 'w':
    case 'W':
      keys.up = true;
      break;
    case 'ArrowDown':
    case 's':
    case 'S':
      keys.down = true;
      break;
    case ' ':
      e.preventDefault();
      keys.space = true;
      break;
    case 'q':
    case 'Q':
      keys.q = true;
      break;
    case 'e':
    case 'E':
      keys.e = true;
      break;
    case 'r':
    case 'R':
      keys.r = true;
      break;
  }
});

document.addEventListener('keyup', (e) => {
  switch(e.key) {
    case 'ArrowLeft':
    case 'a':
    case 'A':
      keys.left = false;
      break;
    case 'ArrowRight':
    case 'd':
    case 'D':
      keys.right = false;
      break;
    case 'ArrowUp':
    case 'w':
    case 'W':
      keys.up = false;
      break;
    case 'ArrowDown':
    case 's':
    case 'S':
      keys.down = false;
      break;
    case 'q':
    case 'Q':
      keys.q = false;
      break;
    case 'e':
    case 'E':
      keys.e = false;
      break;
    case 'r':
    case 'R':
      keys.r = false;
      break;
  }
});

initBeeGame();
renderLeaderboard();
drawBackground();
drawPlayer();
</script>
