<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小蜜蜂游戏</title>
<link rel="stylesheet" href="style.css">
<style>
.bee-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem;
}

.bee-header {
  display: flex;
  align-items: center;
  gap: 30px;
  margin-bottom: 20px;
}

.bee-score-box {
  background: #1e3a5f;
  padding: 12px 24px;
  border-radius: 8px;
  color: #fff;
  font-size: 24px;
  font-weight: bold;
}

.bee-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  background: #f59e0b;
  color: white;
  font-size: 16px;
  transition: background 0.3s;
}

.bee-btn:hover {
  background: #d97706;
}

.bee-game {
  background: linear-gradient(180deg, #87ceeb 0%, #98d8c8 100%);
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  position: relative;
  overflow: hidden;
}

.bee-game::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: 
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3) 2px, transparent 2px),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.2) 2px, transparent 2px),
    radial-gradient(circle at 50% 70%, rgba(255,255,255,0.25) 2px, transparent 2px);
  background-size: 40px 40px;
  pointer-events: none;
}

#beeCanvas {
  border-radius: 8px;
  position: relative;
  z-index: 1;
  cursor: crosshair;
}

.bee-info {
  margin-top: 20px;
  text-align: center;
  color: #666;
}

.bee-game-over {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.bee-game-over.show {
  display: flex;
}

.bee-game-over-content {
  background: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
}

.bee-game-over-content h2 {
  color: #f59e0b;
  margin-bottom: 15px;
}

.bee-game-over-content p {
  color: #333;
  margin-bottom: 20px;
  font-size: 18px;
}

.bee-lives {
  display: flex;
  gap: 10px;
}

.live {
  font-size: 24px;
}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <div class="logo">PCT-100</div>
    <ul class="nav-links">
      <li><a href="index.html">产品说明书</a></li>
      <li><a href="minesweeper.html">扫雷游戏</a></li>
      <li><a href="snake.html">贪吃蛇游戏</a></li>
      <li><a href="bee.html" class="active">小蜜蜂游戏</a></li>
      <li><a href="tetris.html">俄罗斯方块</a></li>
      <li><a href="memory.html">记忆翻牌</a></li>
    </ul>
  </div>
</nav>

<header class="hero">
  <div class="hero-content">
    <h1>🐝 小蜜蜂游戏</h1>
    <p>360度无死角射击！</p>
  </div>
</header>

<div class="bee-container">
  <div class="bee-header">
    <div class="bee-score-box">🏆 得分: <span id="beeScore">0</span></div>
    <div class="bee-score-box">❤️ 生命: <span id="beeLives">3</span></div>
    <div class="bee-score-box">⭐ 等级: <span id="beeLevel">1</span></div>
    <button class="bee-btn" onclick="startBeeGame()">开始游戏</button>
    <button class="bee-btn" onclick="pauseBeeGame()">暂停/继续</button>
  </div>
  
  <div class="bee-game">
    <canvas id="beeCanvas" width="500" height="400"></canvas>
  </div>
  
  <div class="bee-info">
    <p>使用 ← → ↑ ↓ 方向键或 WASD 移动飞船</p>
    <p>鼠标瞄准目标，点击或按空格键发射子弹</p>
  </div>
</div>

<div class="bee-game-over" id="beeGameOver">
  <div class="bee-game-over-content">
    <h2>🐝 游戏结束!</h2>
    <p>最终得分: <span id="beeFinalScore">0</span></p>
    <button class="bee-btn" onclick="restartBeeGame()">重新开始</button>
  </div>
</div>

<script>
const beeCanvas = document.getElementById('beeCanvas');
const beeCtx = beeCanvas.getContext('2d');

const BASE_PLAYER_WIDTH = 50;
const BASE_PLAYER_HEIGHT = 40;
const BULLET_WIDTH = 6;
const BULLET_HEIGHT = 6;
const ENEMY_WIDTH = 40;
const ENEMY_HEIGHT = 30;

let player = { x: 250, y: 350, speed: 6, width: BASE_PLAYER_WIDTH, height: BASE_PLAYER_HEIGHT };
let bullets = [];
let enemies = [];
let score = 0;
let lives = 3;
let killCount = 0;
let level = 1;
let gameLoop = null;
let isPaused = false;
let keys = { left: false, right: false, up: false, down: false, space: false };
let mousePos = { x: 250, y: 200 };

function initBeeGame() {
  player = { x: 250, y: 350, speed: 6, width: BASE_PLAYER_WIDTH, height: BASE_PLAYER_HEIGHT };
  bullets = [];
  enemies = [];
  score = 0;
  lives = 3;
  killCount = 0;
  level = 1;
  isPaused = false;
  updateScoreDisplay();
  updateLivesDisplay();
  document.getElementById('beeGameOver').classList.remove('show');
  
  for (let i = 0; i < 5; i++) {
    enemies.push({
      x: i * 100 + 25,
      y: -ENEMY_HEIGHT - i * 80,
      speed: 2 + Math.random() * 2,
      direction: 1
    });
  }
}

function updateScoreDisplay() {
  document.getElementById('beeScore').textContent = score;
  document.getElementById('beeLevel').textContent = level;
}

function updateLivesDisplay() {
  document.getElementById('beeLives').textContent = lives;
}

function drawPlayer() {
  beeCtx.save();
  
  const dx = mousePos.x - (player.x + player.width/2);
  const dy = mousePos.y - (player.y + player.height/2);
  const angle = Math.atan2(dy, dx);
  
  beeCtx.translate(player.x + player.width/2, player.y + player.height/2);
  beeCtx.rotate(angle);
  
  const w = player.width;
  const h = player.height;
  
  if (level >= 3) {
    drawWings(w, h);
  }
  
  beeCtx.fillStyle = '#1e40af';
  beeCtx.beginPath();
  beeCtx.moveTo(0, -h/2);
  beeCtx.lineTo(-w/4, h/2);
  beeCtx.lineTo(w/4, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  if (level >= 2) {
    beeCtx.fillStyle = '#bfdbfe';
    beeCtx.beginPath();
    beeCtx.moveTo(-5, -h/3);
    beeCtx.lineTo(-3, h/4);
    beeCtx.lineTo(3, h/4);
    beeCtx.lineTo(5, -h/3);
    beeCtx.closePath();
    beeCtx.fill();
  }
  
  beeCtx.fillStyle = '#1d4ed8';
  beeCtx.beginPath();
  beeCtx.moveTo(-w/6, h/2);
  beeCtx.lineTo(0, h/2 + h/5);
  beeCtx.lineTo(w/6, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  if (level >= 4) {
    drawTail(w, h);
    drawCockpit(w, h);
    drawEngines(w, h);
  } else if (level >= 2) {
    drawSideWings(w, h);
  }
  
  beeCtx.restore();
}

function drawWings(w, h) {
  beeCtx.fillStyle = '#0f172a';
  const wingSpan = w * 1.8;
  const wingLength = h * 0.4;
  
  beeCtx.beginPath();
  beeCtx.moveTo(-wingSpan/2, h/4);
  beeCtx.lineTo(-w/5, h/4);
  beeCtx.lineTo(-w/6, h/4 + wingLength);
  beeCtx.lineTo(-wingSpan/2, h/4 + wingLength * 0.8);
  beeCtx.closePath();
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.moveTo(wingSpan/2, h/4);
  beeCtx.lineTo(w/5, h/4);
  beeCtx.lineTo(w/6, h/4 + wingLength);
  beeCtx.lineTo(wingSpan/2, h/4 + wingLength * 0.8);
  beeCtx.closePath();
  beeCtx.fill();
}

function drawSideWings(w, h) {
  beeCtx.fillStyle = '#3b82f6';
  beeCtx.beginPath();
  beeCtx.moveTo(-w/3, h/2 - 8);
  beeCtx.lineTo(-w/2 - 10, h/2 + 5);
  beeCtx.lineTo(-w/3 + 5, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.moveTo(w/3, h/2 - 8);
  beeCtx.lineTo(w/2 + 10, h/2 + 5);
  beeCtx.lineTo(w/3 - 5, h/2);
  beeCtx.closePath();
  beeCtx.fill();
}

function drawTail(w, h) {
  beeCtx.fillStyle = '#1e3a5f';
  beeCtx.beginPath();
  beeCtx.moveTo(-w/6, h/2);
  beeCtx.lineTo(-w/10, h/2 + h/3);
  beeCtx.lineTo(-w/8, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.moveTo(w/6, h/2);
  beeCtx.lineTo(w/10, h/2 + h/3);
  beeCtx.lineTo(w/8, h/2);
  beeCtx.closePath();
  beeCtx.fill();
  
  beeCtx.fillStyle = '#0f172a';
  beeCtx.beginPath();
  beeCtx.moveTo(-3, h/2);
  beeCtx.lineTo(0, h/2 + h/2.5);
  beeCtx.lineTo(3, h/2);
  beeCtx.closePath();
  beeCtx.fill();
}

function drawCockpit(w, h) {
  beeCtx.fillStyle = '#67e8f9';
  beeCtx.beginPath();
  beeCtx.ellipse(0, -h/4, w/8, h/6, 0, 0, Math.PI * 2);
  beeCtx.fill();
  
  beeCtx.fillStyle = '#22d3ee';
  beeCtx.beginPath();
  beeCtx.ellipse(0, -h/4, w/12, h/10, 0, 0, Math.PI * 2);
  beeCtx.fill();
}

function drawEngines(w, h) {
  beeCtx.fillStyle = '#374151';
  beeCtx.beginPath();
  beeCtx.ellipse(-w/3, h/4, w/12, h/8, 0, 0, Math.PI * 2);
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.ellipse(w/3, h/4, w/12, h/8, 0, 0, Math.PI * 2);
  beeCtx.fill();
  
  beeCtx.fillStyle = '#fbbf24';
  beeCtx.beginPath();
  beeCtx.ellipse(-w/3 - w/12, h/4, 3, h/12, 0, 0, Math.PI * 2);
  beeCtx.fill();
  
  beeCtx.beginPath();
  beeCtx.ellipse(w/3 + w/12, h/4, 3, h/12, 0, 0, Math.PI * 2);
  beeCtx.fill();
}

function drawBullets() {
  bullets.forEach(bullet => {
    beeCtx.save();
    beeCtx.translate(bullet.x, bullet.y);
    beeCtx.fillStyle = '#fbbf24';
    beeCtx.beginPath();
    beeCtx.arc(0, 0, BULLET_WIDTH/2, 0, Math.PI * 2);
    beeCtx.fill();
    
    beeCtx.fillStyle = '#f59e0b';
    beeCtx.beginPath();
    beeCtx.arc(0, 0, BULLET_WIDTH/4, 0, Math.PI * 2);
    beeCtx.fill();
    beeCtx.restore();
  });
}

function drawEnemies() {
  enemies.forEach(enemy => {
    beeCtx.fillStyle = '#ef4444';
    beeCtx.beginPath();
    beeCtx.moveTo(enemy.x + ENEMY_WIDTH/2, enemy.y + ENEMY_HEIGHT);
    beeCtx.lineTo(enemy.x, enemy.y);
    beeCtx.lineTo(enemy.x + ENEMY_WIDTH, enemy.y);
    beeCtx.closePath();
    beeCtx.fill();
    
    beeCtx.fillStyle = '#dc2626';
    beeCtx.beginPath();
    beeCtx.arc(enemy.x + ENEMY_WIDTH/2, enemy.y + 10, 8, 0, Math.PI * 2);
    beeCtx.fill();
    
    beeCtx.fillStyle = '#fff';
    beeCtx.beginPath();
    beeCtx.arc(enemy.x + ENEMY_WIDTH/2 - 3, enemy.y + 8, 2, 0, Math.PI * 2);
    beeCtx.arc(enemy.x + ENEMY_WIDTH/2 + 3, enemy.y + 8, 2, 0, Math.PI * 2);
    beeCtx.fill();
  });
}

function drawCrosshair() {
  beeCtx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
  beeCtx.lineWidth = 2;
  
  beeCtx.beginPath();
  beeCtx.moveTo(mousePos.x - 15, mousePos.y);
  beeCtx.lineTo(mousePos.x - 5, mousePos.y);
  beeCtx.moveTo(mousePos.x + 5, mousePos.y);
  beeCtx.lineTo(mousePos.x + 15, mousePos.y);
  beeCtx.moveTo(mousePos.x, mousePos.y - 15);
  beeCtx.lineTo(mousePos.x, mousePos.y - 5);
  beeCtx.moveTo(mousePos.x, mousePos.y + 5);
  beeCtx.lineTo(mousePos.x, mousePos.y + 15);
  beeCtx.stroke();
  
  beeCtx.beginPath();
  beeCtx.arc(mousePos.x, mousePos.y, 20, 0, Math.PI * 2);
  beeCtx.stroke();
}

function updatePlayer() {
  if (keys.left && player.x > 0) {
    player.x -= player.speed;
  }
  if (keys.right && player.x < beeCanvas.width - player.width) {
    player.x += player.speed;
  }
  if (keys.up && player.y > 0) {
    player.y -= player.speed;
  }
  if (keys.down && player.y < beeCanvas.height - player.height) {
    player.y += player.speed;
  }
}

function updateBullets() {
  bullets = bullets.filter(bullet => {
    bullet.x += bullet.vx;
    bullet.y += bullet.vy;
    return bullet.x > 0 && bullet.x < beeCanvas.width &&
           bullet.y > 0 && bullet.y < beeCanvas.height;
  });
  
  if (keys.space) {
    shootBullet();
    keys.space = false;
  }
}

function shootBullet() {
  const dx = mousePos.x - (player.x + player.width/2);
  const dy = mousePos.y - (player.y + player.height/2);
  const distance = Math.sqrt(dx * dx + dy * dy);
  
  if (distance > 0) {
    const baseAngle = Math.atan2(dy, dx);
    const speed = 12;
    const bulletCount = 5;
    const spreadAngle = Math.PI / 4;
    
    for (let i = 0; i < bulletCount; i++) {
      const offsetAngle = spreadAngle * ((i / (bulletCount - 1)) - 0.5) * 2;
      const angle = baseAngle + offsetAngle;
      
      bullets.push({
        x: player.x + player.width/2,
        y: player.y + player.height/2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed
      });
    }
  }
}

function updateEnemies() {
  enemies.forEach(enemy => {
    enemy.y += enemy.speed;
    enemy.x += enemy.direction * 2;
    
    if (enemy.x <= 0 || enemy.x >= beeCanvas.width - ENEMY_WIDTH) {
      enemy.direction *= -1;
    }
    
    if (enemy.y > beeCanvas.height) {
      enemy.y = -ENEMY_HEIGHT;
      enemy.x = Math.random() * (beeCanvas.width - ENEMY_WIDTH);
      enemy.speed = 2 + Math.random() * 2;
    }
  });
}

function checkCollisions() {
  enemies.forEach((enemy, enemyIndex) => {
    bullets.forEach((bullet, bulletIndex) => {
      const closestX = Math.max(enemy.x, Math.min(bullet.x, enemy.x + ENEMY_WIDTH));
      const closestY = Math.max(enemy.y, Math.min(bullet.y, enemy.y + ENEMY_HEIGHT));
      const distanceX = bullet.x - closestX;
      const distanceY = bullet.y - closestY;
      const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);
      
      if (distance < BULLET_WIDTH/2 + 10) {
        bullets.splice(bulletIndex, 1);
        enemies.splice(enemyIndex, 1);
        score += 100 * level;
        killCount++;
        
        if (killCount % 5 === 0) {
          level++;
          player.width = Math.min(BASE_PLAYER_WIDTH + level * 8, 120);
          player.height = Math.min(BASE_PLAYER_HEIGHT + level * 6, 96);
          lives++;
          updateLivesDisplay();
        }
        
        updateScoreDisplay();
        
        enemies.push({
          x: Math.random() * (beeCanvas.width - ENEMY_WIDTH),
          y: -ENEMY_HEIGHT,
          speed: 2 + Math.random() * 2 + level * 0.3,
          direction: Math.random() > 0.5 ? 1 : -1
        });
      }
    });
    
    if (
      player.x < enemy.x + ENEMY_WIDTH &&
      player.x + player.width > enemy.x &&
      player.y < enemy.y + ENEMY_HEIGHT &&
      player.y + player.height > enemy.y
    ) {
      lives--;
      updateLivesDisplay();
      
      enemies.splice(enemyIndex, 1);
      enemies.push({
        x: Math.random() * (beeCanvas.width - ENEMY_WIDTH),
        y: -ENEMY_HEIGHT,
        speed: 2 + Math.random() * 2,
        direction: Math.random() > 0.5 ? 1 : -1
      });
      
      if (lives <= 0) {
        beeGameOver();
      }
    }
  });
}

function beeGameOver() {
  clearInterval(gameLoop);
  document.getElementById('beeFinalScore').textContent = score;
  document.getElementById('beeGameOver').classList.add('show');
}

function drawBackground() {
  beeCtx.fillStyle = '#87ceeb';
  beeCtx.fillRect(0, 0, beeCanvas.width, beeCanvas.height);
  
  beeCtx.fillStyle = '#98d8c8';
  beeCtx.fillRect(0, beeCanvas.height - 30, beeCanvas.width, 30);
  
  beeCtx.fillStyle = '#7fb8aa';
  for (let i = 0; i < 10; i++) {
    beeCtx.fillRect(i * 50, beeCanvas.height - 30, 30, 20);
  }
}

function beeUpdate() {
  if (isPaused) return;
  
  drawBackground();
  updatePlayer();
  updateBullets();
  updateEnemies();
  checkCollisions();
  drawBullets();
  drawEnemies();
  drawPlayer();
  drawCrosshair();
}

function startBeeGame() {
  initBeeGame();
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(beeUpdate, 20);
}

function pauseBeeGame() {
  isPaused = !isPaused;
}

function restartBeeGame() {
  document.getElementById('beeGameOver').classList.remove('show');
  startBeeGame();
}

beeCanvas.addEventListener('mousemove', (e) => {
  const rect = beeCanvas.getBoundingClientRect();
  mousePos.x = e.clientX - rect.left;
  mousePos.y = e.clientY - rect.top;
});

beeCanvas.addEventListener('click', () => {
  if (!isPaused && gameLoop) {
    shootBullet();
  }
});

document.addEventListener('keydown', (e) => {
  switch(e.key) {
    case 'ArrowLeft':
    case 'a':
    case 'A':
      keys.left = true;
      break;
    case 'ArrowRight':
    case 'd':
    case 'D':
      keys.right = true;
      break;
    case 'ArrowUp':
    case 'w':
    case 'W':
      keys.up = true;
      break;
    case 'ArrowDown':
    case 's':
    case 'S':
      keys.down = true;
      break;
    case ' ':
      e.preventDefault();
      keys.space = true;
      break;
  }
});

document.addEventListener('keyup', (e) => {
  switch(e.key) {
    case 'ArrowLeft':
    case 'a':
    case 'A':
      keys.left = false;
      break;
    case 'ArrowRight':
    case 'd':
    case 'D':
      keys.right = false;
      break;
    case 'ArrowUp':
    case 'w':
    case 'W':
      keys.up = false;
      break;
    case 'ArrowDown':
    case 's':
    case 'S':
      keys.down = false;
      break;
  }
});

initBeeGame();
drawBackground();
drawPlayer();
drawCrosshair();
</script>
</body>
</html>
